name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bsdutils ripgrep tmux zsh

      - name: Syntax check
        run: zsh -n scripts/clnkr-popup.zsh scripts/install.zsh scripts/test-clnkr-popup.zsh tmux-clnkr.tmux

      - name: Integration test
        run: zsh scripts/test-clnkr-popup.zsh
